name: Public Static Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: public-static-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build static public site
        run: npm run build
        env:
          NEXT_PUBLIC_PUBLIC_SITE_URL: https://kalahamoon.com
          NEXT_PUBLIC_RUNTIME_APP_URL: https://app.kalahamoon.com
          PUBLIC_SITE_CUSTOM_DOMAIN: kalahamoon.com
          NEXT_PUBLIC_MATOMO_ENABLED: ${{ vars.MATOMO_ENABLED || 'false' }}
          NEXT_PUBLIC_MATOMO_URL: ${{ vars.MATOMO_URL }}
          NEXT_PUBLIC_MATOMO_SITE_ID: ${{ vars.MATOMO_SITE_ID }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
